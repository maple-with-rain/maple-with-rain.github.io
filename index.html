<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #666;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .github-logo {
            width: 32px;
            height: 32px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <h1>欢迎来到我的主页</h1>
    <p>这是托管在 GitHub Pages 上的简单页面。</p>
    <p>查看更多项目：<a href="https://github.com/你的用户名" target="_blank">我的 GitHub</a></p>
    
    <!-- GitHub 图标 -->
    <a href="https://github.com/你的用户名" target="_blank">
        <img class="github-logo" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub">
    </a>
</body>
</html>
